<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NCAA Spread Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>

    --bg:#0d1117;--bg2:#161b22;--bg3:#1c2230;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --text:#e6edf3;--muted:#8b949e;
    --accent:#f78c3f;--blue:#58a6ff;
    --green:#3fb950;--red:#f85149;--yellow:#d29922;
    --r:8px;--r2:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;min-height:100vh;}

  header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;}
  .header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent);white-space:nowrap;}
  .logo span{color:var(--text);font-weight:400;}
  .search-wrap{flex:1;min-width:200px;max-width:380px;position:relative;}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
  #search{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text);font-family:inherit;font-size:14px;padding:7px 12px 7px 34px;outline:none;transition:border-color .15s;}
  #search::placeholder{color:var(--muted);}
  #search:focus{border-color:var(--accent);}
  .tab-bar{display:flex;gap:4px;margin-left:auto;}
  .tab{background:none;border:1px solid transparent;border-radius:6px;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;padding:5px 12px;transition:all .15s;text-transform:uppercase;}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tab:not(.active):hover{color:var(--text);border-color:var(--border2);}

  #status-bar{background:var(--bg3);border-bottom:1px solid var(--border);font-size:12px;padding:6px 16px;}
  .sb-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .status-dot.live{background:var(--green);animation:pulse 1.5s infinite;}
  .status-dot.error{background:var(--red);}
  .status-dot.ok{background:var(--green);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #status-text{color:var(--muted);}
  #last-updated{color:var(--muted);margin-left:auto;}
  .refresh-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 8px;transition:all .15s;font-family:inherit;}
  .refresh-btn:hover{color:var(--text);border-color:var(--accent);}

  #search-results{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;padding:80px 16px 16px;overflow-y:auto;}
  #search-results.visible{display:block;}
  .sr-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);max-width:560px;margin:0 auto;padding:20px;}
  .sr-close{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .sr-close h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;}
  .sr-close button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;}
  .player-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
  .player-card.alive{border-left:3px solid var(--green);}
  .player-card.alive-pending{border-left:3px solid var(--yellow);}
  .player-card.eliminated{border-left:3px solid var(--red);opacity:.75;}
  .player-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
  .player-team{font-size:13px;color:var(--muted);margin-bottom:6px;}
  .status-pill{display:inline-block;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;padding:2px 10px;text-transform:uppercase;}
  .pill-alive{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3);}
  .pill-pending{background:rgba(210,153,34,.15);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
  .pill-out{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.25);}

  #view-bracket,#view-players{display:none;}
  #view-bracket.active,#view-players.active{display:block;}
  .view-wrap{max-width:1400px;margin:0 auto;padding:20px 12px;}

  .rounds-scroll{overflow-x:auto;padding-bottom:12px;}
  .rounds-row{display:flex;gap:0;min-width:860px;align-items:stretch;}
  .round-col{flex:1;min-width:138px;display:flex;flex-direction:column;}
  .round-header{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:8px 10px 6px;text-align:center;}
  .round-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);}
  .round-dates{font-size:11px;color:var(--muted);margin-top:2px;}
  .matchups-col{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:6px;padding:8px 6px;border:1px solid var(--border);border-top:none;background:var(--bg2);}
  .matchup{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--bg);font-size:12px;}
  .matchup.live-game{border-color:var(--green);box-shadow:0 0 0 1px rgba(63,185,80,.2);}
  .live-banner{background:rgba(63,185,80,.12);border-bottom:1px solid rgba(63,185,80,.25);display:flex;align-items:center;justify-content:space-between;padding:3px 8px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1s infinite;flex-shrink:0;}
  .live-label{color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;}
  .live-clock{color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;opacity:.8;}
  .score-box{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--muted);flex-shrink:0;min-width:24px;text-align:right;}
  .score-box.lead{color:var(--text);}
  .matchup-spread{background:rgba(247,140,63,.08);border-bottom:1px solid var(--border);color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;padding:3px 8px;display:flex;flex-direction:column;}
  .matchup-team{align-items:center;border-bottom:1px solid var(--border);display:flex;gap:6px;padding:5px 8px;transition:background .1s;}
  .matchup-team:last-child{border-bottom:none;}
  .matchup-team:hover{background:var(--bg3);}
  .matchup-team.winner{background:rgba(63,185,80,.07);}
  .matchup-team.elim{opacity:.5;}
  .seed{background:var(--bg3);border-radius:4px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;min-width:20px;padding:1px 4px;text-align:center;}
  .team-info{flex:1;min-width:0;}
  .team-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .team-name.w{color:var(--green);}
  .owner-name{color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .owner-name.hl{color:var(--blue);font-weight:500;}
  .score-box{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--muted);flex-shrink:0;}
  .score-box.lead{color:var(--text);}
  .win-check{color:var(--green);font-size:11px;flex-shrink:0;}

  .players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
  .pcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;transition:border-color .15s;}
  .pcard:hover{border-color:var(--border2);}
  .pcard.alive{border-left:3px solid var(--green);}
  .pcard.pending{border-left:3px solid var(--yellow);}
  .pcard.out{border-left:3px solid var(--red);opacity:.65;}
  .pcard-head{align-items:center;display:flex;gap:10px;margin-bottom:10px;}
  .avatar{align-items:center;border-radius:50%;display:flex;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;height:38px;justify-content:center;width:38px;flex-shrink:0;}
  .av-alive{background:rgba(63,185,80,.15);color:var(--green);}
  .av-pending{background:rgba(210,153,34,.15);color:var(--yellow);}
  .av-out{background:rgba(248,81,73,.12);color:var(--red);}
  .pcard-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;}
  .pcard-round{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .pcard-team-row{background:var(--bg3);border-radius:6px;display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 8px;margin-bottom:4px;}
  .upcoming-lbl{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.5px;margin:8px 0 4px;text-transform:uppercase;}
  .next-box{background:rgba(247,140,63,.07);border:1px solid rgba(247,140,63,.2);border-radius:6px;font-size:12px;padding:6px 10px;}

  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:var(--muted);}
  .legend-item{display:flex;align-items:center;gap:5px;}
  .legend-dot{width:8px;height:8px;border-radius:50%;}
  .rules-note{background:rgba(247,140,63,.07);border:1px solid rgba(247,140,63,.2);border-radius:var(--r);color:var(--muted);font-size:12px;margin-bottom:16px;padding:10px 14px;}
  .rules-note strong{color:var(--accent);}
  .region-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:10px 0 4px;}
  .empty-msg{color:var(--muted);font-size:14px;text-align:center;padding:40px;}
  .warn-banner{background:rgba(210,153,34,.08);border:1px solid rgba(210,153,34,.25);border-radius:var(--r);color:var(--yellow);font-size:12px;margin-bottom:16px;padding:10px 14px;}
  .matchup.pending-game{border-color:rgba(210,153,34,.3);}
  .pending-badge{background:rgba(210,153,34,.15);color:var(--yellow);border-radius:3px;font-size:9px;font-weight:700;padding:1px 5px;letter-spacing:.5px;border:1px solid rgba(210,153,34,.3);}
  .tbd-slot{opacity:.4;}
  .tbd-slot .matchup-spread{background:transparent;}

  @media(max-width:600px){
    .tab{font-size:11px;padding:4px 8px;}
    .logo{font-size:17px;}
    .search-wrap{max-width:100%;width:100%;}
    .players-grid{grid-template-columns:1fr;}
  }

</head>

<header>

      <input type="text" id="search" placeholder="Search players or teams…" autocomplete="off" autocorrect="off">
    </div>

    </div>

</header>

<div id="status-bar">

</div>

<div id="search-results">

</div>

    <div class="legend">

      <span class="legend-item"><span class="legend-dot" style="background:var(--yellow)"></span>In progress / upcoming</span>

</div>

// ─── BUILD MATCHUP OBJECTS FROM KNOWN RESULTS + FULL BRACKET PLACEHOLDERS ────
function buildFromKnown() {
  const known = KNOWN_RESULTS.map((r, i) => {
    const topO = OWNER_MAP[r.top], botO = OWNER_MAP[r.bot];
    const hasScore = r.topScore !== null && r.botScore !== null;
    // Only assign original owners for Round 0 — later rounds derive owners
    // by following who covered the spread forward (may differ from team owner).
    const useOwners = r.round === 0;
    return {
      id: `known_${i}`,
      round: r.round,
      region: r.region,
      topSeed: topO?.seed ?? null,
      topTeam: r.top,
      topOwner: useOwners ? (topO?.owner ?? null) : null,
      topScore: r.topScore,
      botSeed: botO?.seed ?? null,
      botTeam: r.bot,
      botOwner: useOwners ? (botO?.owner ?? null) : null,
      botScore: r.botScore,
      spread: r.spread,
      rawWinner: hasScore ? (r.topScore > r.botScore ? 'top' : 'bot') : null,
      isLive: false,
      isFinal: hasScore,
      isPending: !hasScore,
      clock: '',
      period: 0,
      gameDate: r.gameDate || null,
      fromKnown: true,
    };
  });

  // Build a set of all known matchup keys so we can skip duplicates
  const knownKeys = new Set(known.map(m => [m.topTeam, m.botTeam, m.round, m.region].join('|')));
  const knownKeysR = new Set(known.map(m => [m.botTeam, m.topTeam, m.round, m.region].join('|')));
  function alreadyKnown(top, bot, round, region) {
    const k1 = [top, bot, round, region].join('|');
    const k2 = [bot, top, round, region].join('|');
    return knownKeys.has(k1) || knownKeys.has(k2) || knownKeysR.has(k1) || knownKeysR.has(k2);
  }

  // ── ALL FIRST-ROUND MATCHUPS (complete structure, in bracket order) ──
  // Any first-round game not already in KNOWN_RESULTS gets added as a pending placeholder.
  const FIRST_ROUND_STRUCTURE = [
    // West
    {top:'Duke',         bot:'Siena',           spread:27.5,  region:'East'},
    {top:'Ohio St.',     bot:'TCU',             spread:2.5,   region:'East'},
    {top:"St. John's",   bot:'Northern Iowa',   spread:9.5,   region:'East'},
    {top:'Kansas',       bot:'Cal Baptist',     spread:14.0,  region:'East'},
    {top:'Louisville',   bot:'South Florida',   spread:4.5,   region:'East'},
    {top:'Michigan St.', bot:'North Dakota St.',spread:16.0,  region:'East'},
    {top:'UCLA',         bot:'UCF',             spread:5.5,   region:'East'},
    {top:'UConn',        bot:'Furman',          spread:20.5,  region:'East'},
    // South
    {top:'Florida',      bot:'Prairie View',    spread:35.5,  region:'South'},
    {top:'Clemson',      bot:'Iowa',            spread:-2.0,  region:'South'},
    {top:'Vanderbilt',   bot:'McNeese',         spread:12.0,  region:'South'},
    {top:'Nebraska',     bot:'Troy',            spread:13.0,  region:'South'},
    {top:'North Carolina',bot:'VCU',            spread:2.5,   region:'South'},
    {top:'Illinois',     bot:'Penn',            spread:25.5,  region:'South'},
    {top:"Saint Mary's", bot:'Texas A&M',       spread:3.0,   region:'South'},
    {top:'Houston',      bot:'Idaho',           spread:23.5,  region:'South'},
    // West
    {top:'Arizona',      bot:'Long Island',     spread:30.5,  region:'West'},
    {top:'Utah St.',     bot:'Villanova',       spread:-1.5,  region:'West'},
    {top:'Wisconsin',    bot:'High Point',      spread:10.0,  region:'West'},
    {top:'Arkansas',     bot:'Hawaii',          spread:15.5,  region:'West'},
    {top:'BYU',          bot:'Texas',           spread:2.5,   region:'West'},
    {top:'Gonzaga',      bot:'Kennesaw St.',    spread:21.5,  region:'West'},
    {top:'Miami (FL)',   bot:'Missouri',        spread:2.0,   region:'West'},
    {top:'Purdue',       bot:"Queens (N.C.)",   spread:25.5,  region:'West'},
    // Midwest
    {top:'Michigan',     bot:'Howard',          spread:31.0,  region:'Midwest'},
    {top:'Saint Louis',  bot:'Georgia',         spread:2.0,   region:'Midwest'},
    {top:'Texas Tech',   bot:'Akron',           spread:7.5,   region:'Midwest'},
    {top:'Alabama',      bot:'Hofstra',         spread:11.5,  region:'Midwest'},
    {top:'Tennessee',    bot:'Miami OH',        spread:11.0,  region:'Midwest'},
    {top:'Virginia',     bot:'Wright St.',      spread:18.0,  region:'Midwest'},
    {top:'Kentucky',     bot:'Santa Clara',     spread:3.0,   region:'Midwest'},
    {top:'Iowa St.',     bot:'Tennessee St.',   spread:24.5,  region:'Midwest'},
  ];

  let placeholderIdx = 1000;
  for (const g of FIRST_ROUND_STRUCTURE) {
    if (alreadyKnown(g.top, g.bot, 0, g.region)) continue;
    const topO = OWNER_MAP[g.top], botO = OWNER_MAP[g.bot];
    known.push({
      id: `placeholder_${placeholderIdx++}`,
      round: 0, region: g.region,
      topSeed: topO?.seed ?? null, topTeam: g.top, topOwner: topO?.owner ?? null, topScore: null,
      botSeed: botO?.seed ?? null, botTeam: g.bot, botOwner: botO?.owner ?? null, botScore: null,
      spread: g.spread, rawWinner: null, isLive: false, isFinal: false, isPending: true,
      clock: '', period: 0, fromKnown: true,
    });
  }

  // ── DERIVE LATER-ROUND MATCHUPS FROM KNOWN RESULTS ──
  // Standard bracket: games pair in order within each round.
  // R1 slots 0–7 → R2 pairs: (0,1),(2,3),(4,5),(6,7)
  // R2 slots 0–3 → S16 pairs: (0,1),(2,3)
  // S16 slots 0–1 → E8 pair:  (0,1)

  // Helper: returns who advances to the next round from a completed matchup.
  // The TEAM that advances is always the score winner (they're the one playing next).
  // The OWNER that advances is whoever covered the spread — which may be the losing team's owner.
  // e.g. UConn beats Furman but Furman covers → Ron (Furman owner) advances riding UConn.
  function advancingTeam(m) {
    if (!m || m.isTBD) return null;
    if (!m.isFinal || m.rawWinner === null) return null;

    // Score winner = the team that actually won and plays next
    const scoreWinner = m.rawWinner; // 'top' or 'bot'

    // Spread winner = the owner who advances (covered the spread or won outright)
    let spreadWinner;
    if (m.spread === null) {
      spreadWinner = scoreWinner;
    } else {
      const margin = (m.topScore??0) - (m.botScore??0);
      if (m.spread > 0) spreadWinner = margin > m.spread ? 'top' : 'bot';
      else spreadWinner = -margin > Math.abs(m.spread) ? 'bot' : 'top';
    }

    // The advancing team is always the score winner
    const advTeam = scoreWinner === 'top' ? m.topTeam : m.botTeam;
    const advSeed = scoreWinner === 'top' ? m.topSeed : m.botSeed;
    // But the owner is whoever covered the spread
    const advOwner = spreadWinner === 'top' ? m.topOwner : m.botOwner;

    return { team: advTeam, owner: advOwner, seed: advSeed };
  }

  function makeMatchup(region, round, mA, mB, idx) {
    const adA = advancingTeam(mA);
    const adB = advancingTeam(mB);
    const hasTeams = adA || adB;
    if (!hasTeams) {
      // Both undecided — pure TBD slot
      return {
        id: `tbd_${region}_${round}_${idx}_${placeholderIdx++}`,
        round, region,
        topSeed:null, topTeam:'TBD', topOwner:null, topScore:null,
        botSeed:null, botTeam:'TBD', botOwner:null, botScore:null,
        spread:null, rawWinner:null, isLive:false, isFinal:false, isPending:false,
        isTBD:true, clock:'', period:0, fromKnown:true,
      };
    }
    const top = adA || { team:'TBD', owner:null, seed:null };
    const bot = adB || { team:'TBD', owner:null, seed:null };
    return {
      id: `derived_${region}_${round}_${idx}_${placeholderIdx++}`,
      round, region,
      topSeed: top.seed, topTeam: top.team, topOwner: top.owner, topScore: null,
      botSeed: bot.seed, botTeam: bot.team, botOwner: bot.owner, botScore: null,
      spread: null, rawWinner: null, isLive: false, isFinal: false, isPending: false,
      isTBD: top.team === 'TBD' && bot.team === 'TBD',
      isDerived: true, clock: '', period: 0, fromKnown: true,
    };
  }

  // ── BACKFILL OWNERS ON KNOWN R1+ ENTRIES ──
  // KNOWN_RESULTS entries for rounds 1+ have null owners (stripped above).
  // Walk forward round by round within each region, find the advancingTeam
  // from the previous round, and assign their owner to the matching team.
  for (const region of ['East','South','West','Midwest']) {
    for (let round = 1; round <= 3; round++) {
      const prevRound = known
        .filter(m => m.region === region && m.round === round - 1)
        .sort((a,b) => (parseInt(a.id.replace(/\D/g,''))||0) - (parseInt(b.id.replace(/\D/g,''))||0));
      const thisRound = known.filter(m => m.region === region && m.round === round && !m.isTBD && !m.isDerived);
      if (!thisRound.length) break;

      // Build a map of team → advancing owner from previous round
      const ownerByTeam = {};
      for (const m of prevRound) {
        const adv = advancingTeam(m);
        if (adv) ownerByTeam[adv.team] = adv.owner;
      }

      // Apply to this round's known entries
      for (const m of thisRound) {
        if (m.topTeam !== 'TBD' && ownerByTeam[m.topTeam] !== undefined) {
          m.topOwner = ownerByTeam[m.topTeam];
        }
        if (m.botTeam !== 'TBD' && ownerByTeam[m.botTeam] !== undefined) {
          m.botOwner = ownerByTeam[m.botTeam];
        }
      }
    }
  }

  for (const region of ['East','South','West','Midwest']) {
    // Rounds 1 (R2=4 games), 2 (S16=2 games), 3 (E8=1 game)
    for (let round = 1; round <= 3; round++) {
      const existingInRound = known.filter(m => m.region === region && m.round === round && !m.isTBD && !m.isDerived);
      if (existingInRound.length > 0) continue; // already have real data for this round/region

      // Get previous round's matchups in order
      const prevRound = known
        .filter(m => m.region === region && m.round === round - 1 && !m.isTBD)
        .sort((a, b) => {
          // Sort by position in the bracket — use id index as proxy
          const ai = parseInt(a.id.replace(/\D/g,'')) || 0;
          const bi = parseInt(b.id.replace(/\D/g,'')) || 0;
          return ai - bi;
        });

      const expectedCount = [4, 2, 1][round - 1];
      // Pair consecutive previous-round games
      for (let i = 0; i < expectedCount; i++) {
        const mA = prevRound[i * 2];
        const mB = prevRound[i * 2 + 1];
        known.push(makeMatchup(region, round, mA, mB, i));
      }
    }
  }

  // Final Four — pair E8 winners: East vs West, South vs Midwest (standard bracket sides)
  const e8Winners = {
    East:    known.filter(m => m.region === 'East'    && m.round === 3)[0],
    South:   known.filter(m => m.region === 'South'   && m.round === 3)[0],
    West:    known.filter(m => m.region === 'West'    && m.round === 3)[0],
    Midwest: known.filter(m => m.region === 'Midwest' && m.round === 3)[0],
  };
  known.push(makeMatchup('FinalFour', 4, e8Winners.East,  e8Winners.West,    0));
  known.push(makeMatchup('FinalFour', 4, e8Winners.South, e8Winners.Midwest, 1));

  // Championship
  const ff = known.filter(m => m.round === 4);
  known.push(makeMatchup('Championship', 5, ff[0], ff[1], 0));

  const ro = {East:0, South:1, West:2, Midwest:3, FinalFour:4, Championship:5, Unknown:6};
  known.sort((a,b) => (a.round - b.round) || (ro[a.region] - ro[b.region]));
  return known;
}

  url => url,  // direct — works when page is hosted (not file://)
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

async function fetchDate(date) {
  const targetUrl = `${ESPN_BASE}?dates=${date}&groups=100&limit=100`;
  let lastErr;
  for (let i = 0; i < PROXY_FNS.length; i++) {
    const makeUrl = PROXY_FNS[i];
    try {
      const r = await fetch(makeUrl(targetUrl), {cache:'no-store'});
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      console.log(`[ESPN] ${date}: ${data.events?.length ?? 0} events via ${i===0?'direct':'proxy '+i}`);
      return data;
    } catch(e) {
      console.warn(`[ESPN] ${date} failed via ${i===0?'direct':'proxy '+i}:`, e.message);
      lastErr = e;
    }
  }
  throw lastErr;
}

// All tournament dates — fetch broadly, filter to our teams
const FETCH_DATES = [
  '20260319','20260320',
  '20260321','20260322','20260323',
  '20260326','20260327',
  '20260328','20260329',
  '20260404',
  '20260406',
];

function norm(raw) {
  if (!raw) return '';
  const t = raw.trim();
  return ALIASES[t] || t;
}
function ownerInfo(name) { return OWNER_MAP[norm(name)] || null; }

function roundFromNotes(notes, dateStr) {
  const t = (notes||[]).map(n=>n.text||'').join(' ').toLowerCase();
  if (t.includes('1st round')||t.includes('first round')) return 0;
  if (t.includes('2nd round')||t.includes('second round')) return 1;
  if (t.includes('sweet 16')||t.includes('sweet sixteen')) return 2;
  if (t.includes('elite 8')||t.includes('elite eight')) return 3;
  if (t.includes('final four')) return 4;
  if (t.includes('national championship')||t.includes('championship game')) return 5;
  // Infer from date — extend ranges by 1 day to cover late games that tip past midnight UTC
  if (dateStr) {
    const d = parseInt(dateStr.replace(/-/g,''));
    if (d>=20260319&&d<=20260321) return 0;
    if (d>=20260321&&d<=20260323) return 1;
    if (d>=20260326&&d<=20260328) return 2;
    if (d>=20260328&&d<=20260330) return 3;
    if (d>=20260404&&d<=20260405) return 4;
    if (d>=20260406&&d<=20260407) return 5;
  }
  return null;
}

function regionFromNotes(notes, topO, botO) {
  const t = (notes||[]).map(n=>n.text||'').join(' ');
  for (const r of ['East','South','West','Midwest']) if (t.includes(r)) return r;
  return topO?.region || botO?.region || null;
}

function parseEvent(ev) {
  try {
    return _parseEvent(ev);
  } catch(e) {
    console.error('[parseEvent] crash:', e.message, e.stack?.split('\n')[1]);
    return null;
  }
}

function _parseEvent(ev) {
  const comp = (ev.competitions||[])[0];
  if (!comp) return null;
  const competitors = comp.competitors||[];
  if (competitors.length < 2) return null;

  const c0 = competitors[0], c1 = competitors[1];
  const n0 = norm(c0.team?.shortDisplayName||c0.team?.displayName||'');
  const n1 = norm(c1.team?.shortDisplayName||c1.team?.displayName||'');
  const o0 = ownerInfo(n0), o1 = ownerInfo(n1);
  const n0full = norm(c0.team?.displayName||'');
  const n1full = norm(c1.team?.displayName||'');
  const o0final = o0 || ownerInfo(n0full);
  const o1final = o1 || ownerInfo(n1full);
  if (!o0final && !o1final) return null;

  // Sort by seed — lower seed number = top
  const s0 = parseInt(c0.curatedRank?.current||c0.seed||99);
  const s1 = parseInt(c1.curatedRank?.current||c1.seed||99);
  const [topC, botC] = s0 <= s1 ? [c0,c1] : [c1,c0];

  function resolveTeamName(c) {
    const short = norm(c.team?.shortDisplayName||'');
    const full  = norm(c.team?.displayName||'');
    return ownerInfo(short) ? short : ownerInfo(full) ? full : short || full;
  }
  const topName = resolveTeamName(topC);
  const botName = resolveTeamName(botC);
  const topO = ownerInfo(topName);
  const botO = ownerInfo(botName);

  const topScore = parseInt(topC.score);
  const botScore = parseInt(botC.score);
  const statusName = ev.status?.type?.name||'';
  const LIVE_STATUSES = new Set(['STATUS_IN_PROGRESS','STATUS_HALFTIME','STATUS_END_PERIOD','STATUS_OVERTIME','STATUS_IN_OVERTIME']);
  const isLive = LIVE_STATUSES.has(statusName);
  const isFinal = statusName === 'STATUS_FINAL';

  let rawWinner = null;
  if (isFinal && !isNaN(topScore) && !isNaN(botScore)) {
    rawWinner = topScore > botScore ? 'top' : 'bot';
  }

  // Spread: only parse pre-game, never overwrite once live/final
  let spread = null;
  const isScheduled = !isLive && !isFinal;
  const odds = (comp.odds||[])[0];
  if (isScheduled && odds?.details) {
    const om = odds.details.match(/^(.+?)\s+([+-]?\d+\.?\d*)$/);
    if (om) {
      const favNorm = norm(om[1].trim());
      const amt = Math.abs(parseFloat(om[2]));
      spread = favNorm === topName ? amt : favNorm === botName ? -amt : amt;
    }
  }

  const notes = ev.notes||[];
  const dateStr = (ev.date||'').slice(0,10).replace(/-/g,'');
  const round = roundFromNotes(notes, dateStr);
  const region = regionFromNotes(notes, topO, botO);

  console.log(`[parseEvent] ${topName} vs ${botName} | date=${dateStr} round=${round} region=${region} status=${statusName} notes="${notes.map(n=>n.text||'').join(',')}"`);

  if (round === null || !region) return null;

  return {
    id: ev.id,
    round, region,
    topSeed: topO?.seed ?? parseInt(topC.seed) ?? null,
    topTeam: topName, topOwner: topO?.owner ?? null,
    topScore: isNaN(topScore) ? null : topScore,
    botSeed: botO?.seed ?? parseInt(botC.seed) ?? null,
    botTeam: botName, botOwner: botO?.owner ?? null,
    botScore: isNaN(botScore) ? null : botScore,
    spread, rawWinner, isLive, isFinal,
    clock: ev.status?.displayClock||'',
    period: ev.status?.period||0,
    gameDate: ev.date||null,
  };
}



async function loadLiveMatchups() {
  const seen = new Set();
  const live = [];
  // Fetch yesterday through all future tournament dates
  const today = new Date();
  const todayNum = parseInt(today.toISOString().slice(0,10).replace(/-/g,''));
  // Include yesterday in case of late games, all future dates
  const relevantDates = FETCH_DATES.filter(d => parseInt(d) >= todayNum - 1);

  const results = await Promise.allSettled(relevantDates.map(d => fetchDate(d)));
  for (const res of results) {
    if (res.status !== 'fulfilled') continue;
    for (const ev of (res.value.events||[])) {
      if (seen.has(ev.id)) continue;
      const m = parseEvent(ev);
      if (!m) continue;
      seen.add(ev.id);
      live.push(m);
    }
  }
  return live;
}

// ─── MERGE: layer live data on top of known results ───────────────────────────
function mergeMatchups(known, live) {
  // Index live by both team orderings + round, so we always find a match
  // regardless of which team ESPN lists first vs. our KNOWN_RESULTS ordering
  const liveIndex = {};
  for (const m of live) {
    const key1 = [m.topTeam, m.botTeam, m.round].join('|');
    const key2 = [m.botTeam, m.topTeam, m.round].join('|');
    liveIndex[key1] = m;
    liveIndex[key2] = m;
  }

  const merged = known.map(k => {
    // Try both orderings — known entry may have teams in different order than ESPN
    const key1 = [k.topTeam, k.botTeam, k.round].join('|');
    const key2 = [k.botTeam, k.topTeam, k.round].join('|');
    const liveMatch = liveIndex[key1] || liveIndex[key2];
    if (!liveMatch) return k;
    return {
      ...liveMatch,
      // Always preserve our known team ordering for display consistency
      topTeam: k.topTeam, topOwner: k.topOwner, topSeed: k.topSeed,
      botTeam: k.botTeam, botOwner: k.botOwner, botSeed: k.botSeed,
      // Swap scores if ESPN returned teams in opposite order
      topScore: liveMatch.topTeam === k.topTeam ? liveMatch.topScore : liveMatch.botScore,
      botScore: liveMatch.topTeam === k.topTeam ? liveMatch.botScore : liveMatch.topScore,
      rawWinner: liveMatch.rawWinner === null ? null
        : liveMatch.topTeam === k.topTeam ? liveMatch.rawWinner
        : liveMatch.rawWinner === 'top' ? 'bot' : 'top',
      // Freeze spread at known value — never overwrite once game starts
      spread: k.spread !== null ? k.spread : liveMatch.spread,
      gameDate: liveMatch.gameDate || k.gameDate,
    };
  });

  // Add any live matchups not in known (future rounds picked up from API)
  const knownKeys = new Set(known.flatMap(k => [
    [k.topTeam, k.botTeam, k.round].join('|'),
    [k.botTeam, k.topTeam, k.round].join('|'),
  ]));
  for (const m of live) {
    const key = [m.topTeam, m.botTeam, m.round].join('|');
    if (!knownKeys.has(key)) merged.push(m);
  }

  const ro = {East:0, South:1, West:2, Midwest:3, FinalFour:4, Championship:5, Unknown:6};
  merged.sort((a,b) => (a.round - b.round) || (ro[a.region] - ro[b.region]));
  return merged;
}

// ─── SPREAD POOL LOGIC ────────────────────────────────────────────────────────
function spreadOwnerWinner(m) {
  if (!m.isFinal || m.rawWinner === null) return null;
  if (m.spread === null) return m.rawWinner;
  const margin = (m.topScore??0)-(m.botScore??0);
  if (m.spread > 0) {
    return margin > m.spread ? 'top' : 'bot';
  } else {
    return -margin > Math.abs(m.spread) ? 'bot' : 'top';
  }
}

function spreadLabel(m) {
  if (m.spread === null) return 'Spread TBD';
  if (m.spread === 0) return "Pick'em";
  const abs = Math.abs(m.spread).toFixed(1).replace('.0','');
  return m.spread > 0 ? `${m.topTeam} -${abs}` : `${m.botTeam} -${abs}`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
let MATCHUPS = buildFromKnown(); // start with known data immediately
let usingLive = false;
let currentView = 'bracket';
let refreshTimer = null;

function teamRow(seed, team, owner, isWinner, isElim, hl, score, leading, showScore) {
  const wc=isWinner?' winner':'', ec=isElim?' elim':'';
  const oc=owner&&hl&&owner.toLowerCase()===hl.toLowerCase()?' hl':'';
  const seedH=seed?`<span class="seed">${seed}</span>`:`<span class="seed" style="opacity:.3">?</span>`;
  const scoreH=showScore&&score!==null?`<span class="score-box${leading?' lead':''}">${score}</span>`:'';
  const chk=isWinner?'<span class="win-check">✓</span>':'';
  return `<div class="matchup-team${wc}${ec}">${seedH}<div class="team-info"><div class="team-name${wc}">${team||'TBD'}</div>${owner?`<div class="owner-name${oc}">${owner}</div>`:''}</div>${scoreH}${chk}</div>`;
}

// Format ISO date string → "Thu Mar 19, 7:10 PM" (user's local time)
// Falls back to round-based approximate date label if no ISO date available
function formatGameTime(iso, round) {
  if (iso) {
    try {
      const d = new Date(iso);
      // Only show time if it's not midnight UTC (some ESPN dates are date-only)
      const hasTime = d.getUTCHours() !== 0 || d.getUTCMinutes() !== 0;
      const day = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
      if (hasTime) {
        const time = d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
        return `${day}, ${time}`;
      }
      return day;
    } catch(e) {}
  }
  // Fallback: approximate label from round number
  const approx = ['Mar 19–20','Mar 21–22','Mar 26–27','Mar 28–29','Apr 4','Apr 6'];
  return round != null && approx[round] ? approx[round] : null;
}

function matchupHtml(m, hl) {
  const timeStr = formatGameTime(m.gameDate, m.round);
  const timeHtml = timeStr
    ? `<div style="font-size:10px;color:var(--muted);font-weight:400;font-family:'Barlow',sans-serif;margin-top:1px">${timeStr}</div>`
    : '';

  // ── TBD slot ──
  if (m.isTBD) {
    return `<div class="matchup tbd-slot">
      <div class="matchup-spread" style="flex-direction:column;align-items:stretch">
        <span>Spread TBD</span>${timeHtml}
      </div>
      <div class="matchup-team"><span class="seed" style="opacity:.3">?</span><div class="team-info"><div class="team-name" style="color:var(--muted)">TBD</div></div></div>
      <div class="matchup-team"><span class="seed" style="opacity:.3">?</span><div class="team-info"><div class="team-name" style="color:var(--muted)">TBD</div></div></div>
    </div>`;
  }

  // ── Derived (teams known, not yet played) ──
  if (m.isDerived) {
    const topName = m.topTeam !== 'TBD' ? m.topTeam : null;
    const botName = m.botTeam !== 'TBD' ? m.botTeam : null;
    const topHl = topName && hl && m.topOwner?.toLowerCase()===hl.toLowerCase();
    const botHl = botName && hl && m.botOwner?.toLowerCase()===hl.toLowerCase();
    const mkRow = (seed, name, owner, isHl) =>
      `<div class="matchup-team">
        ${seed?`<span class="seed">${seed}</span>`:`<span class="seed" style="opacity:.3">?</span>`}
        <div class="team-info">
          <div class="team-name" style="color:${name?'var(--text)':'var(--muted)'}">${name||'TBD'}</div>
          ${owner?`<div class="owner-name${isHl?' hl':''}">${owner}</div>`:''}
        </div>
      </div>`;
    return `<div class="matchup pending-game">
      <div class="matchup-spread" style="flex-direction:column;align-items:stretch">
        <div style="display:flex;justify-content:space-between;align-items:center"><span>Spread TBD</span><span class="pending-badge">Upcoming</span></div>
        ${timeHtml}
      </div>
      ${mkRow(m.topSeed, topName, m.topOwner, topHl)}
      ${mkRow(m.botSeed, botName, m.botOwner, botHl)}
    </div>`;
  }

  const sw = spreadOwnerWinner(m);
  const topWin = sw==='top', botWin = sw==='bot';
  const topLead = m.isLive && (m.topScore??0) > (m.botScore??0);
  const botLead = m.isLive && (m.botScore??0) > (m.topScore??0);

  // ── Live game banner ──
  let topBanner = '';
  if (m.isLive) {
    const periodStr = m.period ? `${m.period}H` : '';
    const clockStr = m.clock || '';
    const gameInfo = [periodStr, clockStr].filter(Boolean).join(' ');
    topBanner = `<div class="live-banner">
      <div style="display:flex;align-items:center;gap:5px">
        <span class="live-dot"></span>
        <span class="live-label">LIVE</span>
        ${gameInfo ? `<span class="live-clock">${gameInfo}</span>` : ''}
      </div>
      <span style="font-size:10px;color:rgba(63,185,80,.7);font-family:'Barlow',sans-serif">updates every 15s</span>
    </div>`;
  } else if (m.isPending) {
    topBanner = `<div style="background:rgba(210,153,34,.08);border-bottom:1px solid rgba(210,153,34,.2);display:flex;align-items:center;gap:5px;padding:3px 8px">
      <span class="pending-badge">Upcoming</span>
    </div>`;
  }

  const showScore = m.isLive || m.isFinal;

  return `<div class="matchup${m.isLive?' live-game':''}${m.isPending?' pending-game':''}">
    ${topBanner}
    <div class="matchup-spread" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;justify-content:space-between;align-items:center"><span>${spreadLabel(m)}</span></div>
      ${timeHtml}
    </div>
    ${teamRow(m.topSeed,m.topTeam,m.topOwner,topWin,m.isFinal&&botWin,hl,m.topScore,topLead,showScore)}
    ${teamRow(m.botSeed,m.botTeam,m.botOwner,botWin,m.isFinal&&topWin,hl,m.botScore,botLead,showScore)}
  </div>`;
}

// ─── PLAYERS ──────────────────────────────────────────────────────────────────
function getInitials(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}

// Returns status for ONE team entry belonging to an owner.
// Each owner has up to 2 teams; we call this once per team.
function teamEntryStatus(owner, team) {
  // Find all matchups this specific team has played
  const mine = MATCHUPS.filter(m =>
    (m.topTeam === team && m.topOwner === owner) ||
    (m.botTeam === team && m.botOwner === owner)
  );
  if (!mine.length) return null;
  mine.sort((a,b) => b.round - a.round);
  const latest = mine[0];
  const side = latest.topTeam === team ? 'top' : 'bot';
  const sw = spreadOwnerWinner(latest);

  let status;
  if (latest.isLive) status = 'live';
  else if (!latest.isFinal && !latest.isPending) status = 'tbd';
  else if (!latest.isFinal) status = 'scheduled';
  else status = sw === side ? 'alive' : 'eliminated';

  const curSeed = side === 'top' ? latest.topSeed : latest.botSeed;
  const nextM = status === 'alive'
    ? MATCHUPS.find(m =>
        m.round === latest.round + 1 &&
        ((m.topTeam === team && m.topOwner === owner) ||
         (m.botTeam === team && m.botOwner === owner))
      )
    : null;

  return { latest, side, status, team, curSeed, nextM };
}

// Get all unique teams for an owner from OWNER_MAP
function teamsForOwner(owner) {
  return Object.entries(OWNER_MAP)
    .filter(([, v]) => v.owner === owner)
    .map(([team]) => team);
}

// Overall owner status = best of their two teams
// alive/live/scheduled > eliminated
function ownerOverallStatus(owner) {
  const teams = teamsForOwner(owner);
  const entries = teams.map(t => teamEntryStatus(owner, t)).filter(Boolean);
  const order = { live:0, scheduled:1, alive:2, tbd:3, eliminated:4 };
  entries.sort((a,b) => (order[a.status]??4) - (order[b.status]??4));
  return entries[0]?.status ?? 'eliminated';
}

function renderPlayersView(filter) {
  const allOwners = [...new Set(Object.values(OWNER_MAP).map(o=>o.owner))].sort();
  const c = document.getElementById('players-container');
  const filtered = filter
    ? allOwners.filter(o => o.toLowerCase().includes(filter.toLowerCase()))
    : allOwners;
  if (!filtered.length) { c.innerHTML=`<div class="empty-msg">No player named "${filter}"</div>`; return; }

  const ord = { live:0, scheduled:1, alive:2, tbd:3, eliminated:4 };
  filtered.sort((a,b) => (ord[ownerOverallStatus(a)]??4) - (ord[ownerOverallStatus(b)]??4));

  let html = `<div class="players-grid">`;
  filtered.forEach(owner => {
    const teams = teamsForOwner(owner);
    const entries = teams.map(t => teamEntryStatus(owner, t)).filter(Boolean);
    if (!entries.length) return;

    const overallStatus = ownerOverallStatus(owner);
    const cardClass = overallStatus === 'eliminated' ? 'out'
      : (overallStatus === 'live' || overallStatus === 'scheduled') ? 'pending'
      : 'alive';
    const avClass = `av-${cardClass}`;

    // Build one row per team entry
    let teamsHtml = '';
    entries.forEach(e => {
      const statusColor = e.status === 'eliminated' ? 'var(--red)'
        : e.status === 'alive' ? 'var(--green)'
        : e.status === 'live' ? 'var(--green)'
        : 'var(--muted)';
      const statusIcon = e.status === 'eliminated' ? '✕'
        : e.status === 'alive' ? '✓'
        : e.status === 'live' ? '●'
        : e.status === 'scheduled' ? '·'
        : '?';
      const roundLabel = e.status === 'eliminated'
        ? `Out in ${ROUNDS[e.latest.round]}`
        : e.status === 'alive'
        ? `Alive · ${ROUNDS[e.latest.round]} ✓`
        : e.status === 'live'
        ? `🔴 Live · ${ROUNDS[e.latest.round]}`
        : e.status === 'scheduled'
        ? `Up · ${ROUNDS[e.latest.round]}`
        : `${ROUNDS[e.latest.round]}`;

      let nextHtml = '';
      if (e.nextM) {
        const oppSide = e.nextM.topTeam === e.team ? 'bot' : 'top';
        const oppTeam = oppSide === 'top' ? e.nextM.topTeam : e.nextM.botTeam;
        const oppOwner = oppSide === 'top' ? e.nextM.topOwner : e.nextM.botOwner;
        nextHtml = `<div style="font-size:11px;color:var(--muted);margin-top:2px">Next vs ${oppTeam}${oppOwner ? ` (${oppOwner})` : ''} · ${spreadLabel(e.nextM)}</div>`;
      } else if (e.status === 'scheduled') {
        const oppSide = e.latest.topTeam === e.team ? 'bot' : 'top';
        const oppTeam = oppSide === 'top' ? e.latest.topTeam : e.latest.botTeam;
        const oppOwner = oppSide === 'top' ? e.latest.topOwner : e.latest.botOwner;
        nextHtml = `<div style="font-size:11px;color:var(--muted);margin-top:2px">vs ${oppTeam}${oppOwner ? ` (${oppOwner})` : ''} · ${spreadLabel(e.latest)}</div>`;
      }

      teamsHtml += `<div class="pcard-team-row" style="border-left:2px solid ${statusColor}">
        ${e.curSeed ? `<span class="seed">${e.curSeed}</span>` : ''}
        <div style="flex:1;min-width:0">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.team}</div>
          <div style="font-size:11px;color:${statusColor}">${roundLabel}</div>
          ${nextHtml}
        </div>
      </div>`;
    });

    const pillClass = overallStatus === 'eliminated' ? 'pill-out'
      : (overallStatus === 'live' || overallStatus === 'scheduled') ? 'pill-pending'
      : 'pill-alive';
    const pillText = overallStatus === 'eliminated' ? 'Both Out'
      : overallStatus === 'live' ? '🔴 Live'
      : overallStatus === 'scheduled' ? 'Upcoming'
      : 'Alive';

    html += `<div class="pcard ${cardClass}">
      <div class="pcard-head">
        <div class="avatar ${avClass}">${getInitials(owner)}</div>
        <div><div class="pcard-name">${owner}</div><span class="status-pill ${pillClass}">${pillText}</span></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">${teamsHtml}</div>
    </div>`;
  });

  html += '</div>';
  c.innerHTML = html;
}




// ─── SEARCH ───────────────────────────────────────────────────────────────────
function matchupCardSearch(m) {
  // Render a compact matchup card for search results
  const sw = spreadOwnerWinner(m);
  const topWin = sw === 'top', botWin = sw === 'bot';
  const showScore = m.isLive || m.isFinal;
  const topLead = m.isLive && (m.topScore??0) > (m.botScore??0);
  const botLead = m.isLive && (m.botScore??0) > (m.topScore??0);
  const timeStr = formatGameTime(m.gameDate, m.round);

  const statusLabel = m.isLive
    ? `<span class="live-label" style="font-size:11px">● LIVE${m.clock ? ' · '+m.clock : ''}</span>`
    : m.isFinal ? `<span style="font-size:11px;color:var(--muted)">Final</span>`
    : m.isPending || m.isDerived ? `<span class="pending-badge">Upcoming</span>`
    : `<span style="font-size:11px;color:var(--muted)">TBD</span>`;

  const mkRow = (seed, team, owner, isWin, isElim, score, leading) => {
    const wc = isWin ? ' winner' : '';
    const ec = isElim ? ' elim' : '';
    const scoreH = showScore && score !== null ? `<span class="score-box${leading?' lead':''}">${score}</span>` : '';
    const chk = isWin ? '<span class="win-check">✓</span>' : '';
    return `<div class="matchup-team${wc}${ec}">
      ${seed ? `<span class="seed">${seed}</span>` : `<span class="seed" style="opacity:.3">?</span>`}
      <div class="team-info">
        <div class="team-name${wc}">${team||'TBD'}</div>
        ${owner ? `<div class="owner-name">${owner}</div>` : ''}
      </div>
      ${scoreH}${chk}
    </div>`;
  };

  return `<div class="player-card alive" style="padding:0;overflow:hidden;margin-bottom:10px">
    <div style="background:rgba(247,140,63,.08);padding:5px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--accent)">${ROUNDS[m.round]} · ${m.region}</span>
      <div style="display:flex;align-items:center;gap:6px">${statusLabel}${timeStr ? `<span style="font-size:10px;color:var(--muted)">${timeStr}</span>` : ''}</div>
    </div>
    <div style="padding:4px 0">
      ${mkRow(m.topSeed, m.topTeam, m.topOwner, topWin, m.isFinal&&botWin, m.topScore, topLead)}
      ${mkRow(m.botSeed, m.botTeam, m.botOwner, botWin, m.isFinal&&topWin, m.botScore, botLead)}
    </div>
    ${m.spread !== null ? `<div style="padding:3px 10px;border-top:1px solid var(--border);font-size:11px;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-weight:600">${spreadLabel(m)}</div>` : ''}
  </div>`;
}

function doSearch(q) {
  if (!q.trim()) { closeSearch(); return; }
  const ql = q.toLowerCase().trim();

  // Match owners (player names)
  const allOwners = [...new Set(Object.values(OWNER_MAP).map(o=>o.owner))];
  const matchedOwners = allOwners.filter(o => o.toLowerCase().includes(ql));

  // Match teams
  const allTeams = Object.keys(OWNER_MAP);
  const matchedTeams = allTeams.filter(t => t.toLowerCase().includes(ql));

  // Match matchups (either team in any game)
  const matchedMatchups = MATCHUPS.filter(m =>
    !m.isTBD &&
    (m.topTeam.toLowerCase().includes(ql) || m.botTeam.toLowerCase().includes(ql) ||
     (m.topOwner||'').toLowerCase().includes(ql) || (m.botOwner||'').toLowerCase().includes(ql))
  );

  const totalResults = matchedOwners.length + (matchedMatchups.length > 0 && matchedOwners.length === 0 ? matchedMatchups.length : 0);

  if (!matchedOwners.length && !matchedMatchups.length) {
    document.getElementById('sr-title').textContent = 'No results';
    document.getElementById('sr-body').innerHTML = `<div class="empty-msg" style="padding:20px">Nothing found for "${q}"</div>`;
    document.getElementById('search-results').classList.add('visible');
    return;
  }

  let html = '';

  // ── Player results ──
  if (matchedOwners.length) {
    if (matchedMatchups.length && !matchedOwners.some(o => o.toLowerCase() === ql)) {
      html += `<div style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Players</div>`;
    }
    matchedOwners.forEach(owner => {
      const teams = teamsForOwner(owner);
      const entries = teams.map(t => teamEntryStatus(owner, t)).filter(Boolean);
      const overallStatus = ownerOverallStatus(owner);
      const cardClass = overallStatus==='eliminated'?'eliminated':(overallStatus==='live'||overallStatus==='scheduled')?'alive-pending':'alive';
      const pillClass = overallStatus==='eliminated'?'pill-out':(overallStatus==='live'||overallStatus==='scheduled')?'pill-pending':'pill-alive';
      const pillText = overallStatus==='eliminated'?'Both Out':overallStatus==='live'?'🔴 Live':overallStatus==='scheduled'?'Upcoming':'Still Alive';

      let teamsHtml = '';
      entries.forEach(e => {
        const statusColor = e.status==='eliminated'?'var(--red)':e.status==='alive'?'var(--green)':e.status==='live'?'var(--green)':'var(--muted)';
        const roundLabel = e.status==='eliminated'?`Out in ${ROUNDS[e.latest.round]}`:e.status==='alive'?`Alive · ${ROUNDS[e.latest.round]} ✓`:e.status==='live'?`🔴 Live · ${ROUNDS[e.latest.round]}`:e.status==='scheduled'?`Upcoming · ${ROUNDS[e.latest.round]}`:`${ROUNDS[e.latest.round]}`;
        let nextHtml = '';
        if (e.nextM) {
          const oppSide = e.nextM.topTeam===e.team?'bot':'top';
          const oppTeam = oppSide==='top'?e.nextM.topTeam:e.nextM.botTeam;
          nextHtml = `<div style="font-size:11px;color:var(--muted)">Next vs ${oppTeam} · ${spreadLabel(e.nextM)}</div>`;
        } else if (e.status==='scheduled') {
          const oppSide = e.latest.topTeam===e.team?'bot':'top';
          const oppTeam = oppSide==='top'?e.latest.topTeam:e.latest.botTeam;
          nextHtml = `<div style="font-size:11px;color:var(--muted)">vs ${oppTeam} · ${spreadLabel(e.latest)}</div>`;
        }
        teamsHtml += `<div style="display:flex;align-items:flex-start;gap:8px;margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:6px;border-left:2px solid ${statusColor}">
          ${e.curSeed?`<span class="seed">${e.curSeed}</span>`:''}
          <div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px">${e.team}</div>
          <div style="font-size:11px;color:${statusColor}">${roundLabel}</div>${nextHtml}</div>
        </div>`;
      });
      html += `<div class="player-card ${cardClass}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div class="player-name">${owner}</div>
          <span class="status-pill ${pillClass}">${pillText}</span>
        </div>
        ${teamsHtml}
      </div>`;
    });
  }

  // ── Game/matchup results (when searching by team name) ──
  // Only show if query doesn't fully match a player name (avoid duplication)
  const queryMatchesOwner = matchedOwners.some(o => o.toLowerCase() === ql);
  const gameMatchups = matchedMatchups.filter(m =>
    m.topTeam.toLowerCase().includes(ql) || m.botTeam.toLowerCase().includes(ql)
  );
  if (gameMatchups.length && !queryMatchesOwner) {
    if (matchedOwners.length) {
      html += `<div style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:12px 0 8px">Games</div>`;
    }
    // Deduplicate — show each matchup once
    const seen = new Set();
    gameMatchups.forEach(m => {
      if (seen.has(m.id)) return;
      seen.add(m.id);
      html += matchupCardSearch(m);
    });
  }

  const resultCount = matchedOwners.length + (gameMatchups.length && !queryMatchesOwner ? gameMatchups.length : 0);
  document.getElementById('sr-title').textContent = `${resultCount} result${resultCount !== 1 ? 's' : ''}`;
  document.getElementById('sr-body').innerHTML = html;
  document.getElementById('search-results').classList.add('visible');
}
function closeSearch(){document.getElementById('search-results').classList.remove('visible');document.getElementById('search').value='';}

// ─── STATUS BAR ───────────────────────────────────────────────────────────────
function setStatus(state,msg){
  const d=document.getElementById('status-dot');
  const t=document.getElementById('status-text');
  d.className='status-dot'+(state==='live'?' live':state==='error'?' error':state==='ok'?' ok':'');
  t.textContent=msg;
}
function setUpdated(){
  const now=new Date();
  document.getElementById('last-updated').textContent=`Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
}

// ─── FETCH + RENDER ───────────────────────────────────────────────────────────
async function fetchAndRender(manual=false) {
  if (manual) setStatus('','Refreshing live data…');
  try {
    const liveData = await loadLiveMatchups();
    console.log('[DEBUG] Live matchups from ESPN:', liveData.length, liveData.map(m=>`${m.topTeam} vs ${m.botTeam} R${m.round} live=${m.isLive} final=${m.isFinal} top=${m.topScore} bot=${m.botScore}`));
    const known = buildFromKnown();
    MATCHUPS = mergeMatchups(known, liveData);
    const liveGames = MATCHUPS.filter(m=>m.isLive);
    console.log('[DEBUG] Live games after merge:', liveGames.map(m=>`${m.topTeam} vs ${m.botTeam} ${m.topScore}-${m.botScore}`));
    usingLive = true;
    const liveCount = liveGames.length;
    setStatus(liveCount?'live':'ok',
      liveCount ? `${liveCount} game${liveCount>1?'s':''} live — scores updating every 15s`
                : `Live data loaded · ${MATCHUPS.length} games · Auto-refreshes every 3 min`);
    setUpdated();
  } catch(e) {
    console.warn('ESPN API unavailable:', e.message);
    setStatus('error','ESPN API unavailable — showing cached results');
    setUpdated();
  }
  if (currentView==='bracket') renderBracket(null);
  else renderPlayersView('');
  scheduleRefresh();
}

function scheduleRefresh() {
  clearInterval(refreshTimer);
  const live = MATCHUPS.some(m=>m.isLive);
  // 15s during live games, 3min otherwise
  refreshTimer = setInterval(()=>fetchAndRender(), live ? 15_000 : 3*60_000);
}

function showView(v) {
  currentView=v;
  document.getElementById('view-bracket').classList.toggle('active',v==='bracket');
  document.getElementById('view-players').classList.toggle('active',v==='players');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&v==='bracket')||(i===1&&v==='players')));
  if (v==='players') renderPlayersView('');
  else renderBracket(null);
}

// ─── LISTENERS ────────────────────────────────────────────────────────────────
const se=document.getElementById('search');
let st;
se.addEventListener('input',e=>{clearTimeout(st);const v=e.target.value;if(!v.trim()){closeSearch();return;}st=setTimeout(()=>doSearch(v),250);});
se.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();if(e.key==='Enter')doSearch(e.target.value);});
document.getElementById('search-results').addEventListener('click',e=>{if(e.target===document.getElementById('search-results'))closeSearch();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
// 1. Immediately render from known data (bracket is never empty)
setStatus('','Loading live data from ESPN…');
renderBracket(null);

// 2. Then fetch live data in background and merge
fetchAndRender();
</script>
